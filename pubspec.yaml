name: foursquare_movement_sdk
description: "Flutter plugin for the Foursquare Movement SDK (passive location, venue detection, geofencing)."
version: 0.0.1
homepage: https://github.com/Atmosphere-App/foursquare_movement_sdk
repository: https://github.com/Atmosphere-App/foursquare_movement_sdk
issue_tracker: https://github.com/Atmosphere-App/foursquare_movement_sdk/issues

environment:
  sdk: ^3.9.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  pigeon: ^26.1.7

flutter:
  plugin:
    platforms:
      android:
        package: com.atmosphere.foursquare_movement_sdk
        pluginClass: FoursquareMovementSdkPlugin
      ios:
        pluginClass: FoursquareMovementSdkPlugin
